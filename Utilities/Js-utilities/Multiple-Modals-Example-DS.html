<!-- 
 Simple Structure for Multiple Modals
Here's a clean, easy-to-understand example with 3 different modals: 
-->
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multiple Modals Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-4">Three Different Modals</h1>
        
        <!-- BUTTONS to open each modal -->
        <div class="d-flex gap-3 justify-content-center">
            <button type="button" class="btn btn-primary btn-lg" data-bs-toggle="modal" data-bs-target="#modal1">
                <i class="bi bi-person"></i> Modal 1 - Name
            </button>
            
            <button type="button" class="btn btn-success btn-lg" data-bs-toggle="modal" data-bs-target="#modal2">
                <i class="bi bi-envelope"></i> Modal 2 - Email
            </button>
            
            <button type="button" class="btn btn-warning btn-lg" data-bs-toggle="modal" data-bs-target="#modal3">
                <i class="bi bi-chat"></i> Modal 3 - Message
            </button>
        </div>

        <!-- ========================================== -->
        <!-- MODAL 1: Name Input (similar to yours) -->
        <!-- ========================================== -->
        <div class="modal fade" id="modal1" data-bs-backdrop="static" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title"><i class="bi bi-person"></i> Enter Your Name</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="text" id="nameInput" class="form-control" placeholder="Your name">
                        <p id="nameResult" class="mt-3 text-center fw-bold">---</p>
                        <button id="showNameBtn" class="btn btn-primary w-100">Show Name</button>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
    
        <!-- ========================================== -->
        <!-- MODAL 2: Email Input -->
        <!-- ========================================== -->
        <div class="modal fade" id="modal2" data-bs-backdrop="static" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-success text-white">
                        <h5 class="modal-title"><i class="bi bi-envelope"></i> Enter Your Email</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="email" id="emailInput" class="form-control" placeholder="your@email.com">
                        <p id="emailResult" class="mt-3 text-center fw-bold">---</p>
                        <button id="showEmailBtn" class="btn btn-success w-100">Show Email</button>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- MODAL 3: Message Input -->
        <!-- ========================================== -->
        <div class="modal fade" id="modal3" data-bs-backdrop="static" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-warning text-dark">
                        <h5 class="modal-title"><i class="bi bi-chat"></i> Enter Your Message</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <textarea id="messageInput" class="form-control" rows="3" placeholder="Your message..."></textarea>
                        <p id="messageResult" class="mt-3 text-center fw-bold">---</p>
                        <button id="showMessageBtn" class="btn btn-warning w-100">Show Message</button>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Separate JavaScript for each modal -->
    <script>
        // MODAL 1 JavaScript
        const nameInput = document.getElementById("nameInput");
        const nameResult = document.getElementById("nameResult");
        const showNameBtn = document.getElementById("showNameBtn");
        
        if (showNameBtn) {
            showNameBtn.addEventListener("click", function() {
                const name = nameInput.value.trim();
                if (name === "") {
                    alert("Please enter your name");
                } else {
                    nameResult.innerText = "Hello, " + name + "!";
                }
            });
        }
        
        // MODAL 2 JavaScript
        const emailInput = document.getElementById("emailInput");
        const emailResult = document.getElementById("emailResult");
        const showEmailBtn = document.getElementById("showEmailBtn");
        
        if (showEmailBtn) {
            showEmailBtn.addEventListener("click", function() {
                const email = emailInput.value.trim();
                if (email === "") {
                    alert("Please enter your email");
                } else {
                    emailResult.innerText = "Your email: " + email;
                }
            });
        }
        
        // MODAL 3 JavaScript
        const messageInput = document.getElementById("messageInput");
        const messageResult = document.getElementById("messageResult");
        const showMessageBtn = document.getElementById("showMessageBtn");
        
        if (showMessageBtn) {
            showMessageBtn.addEventListener("click", function() {
                const message = messageInput.value.trim();
                if (message === "") {
                    alert("Please enter a message");
                } else {
                    messageResult.innerText = "You said: " + message;
                }
            });
        }
    </script>
</body>
</html>

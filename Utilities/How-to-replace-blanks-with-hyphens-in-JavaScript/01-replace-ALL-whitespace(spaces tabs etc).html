/* If you want to replace ALL whitespace (spaces, tabs, etc.) */
<!DOCTYPE html>
<html>
<head>
    <title>replace ALL whitespace (spaces, tabs, etc.)</title>
</head>
<body>
    <script>
        let inputstring = "My fist-web page";
        let outputstring = inputstring.replace(/\s/g, '-');
        console.log(outputstring);
    </script>
</body>
</html>
